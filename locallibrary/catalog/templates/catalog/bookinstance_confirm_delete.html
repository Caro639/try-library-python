{% extends "base_generic.html" %}

{% block content %}
<h1>Supprimer la copie</h1>

<p>Êtes-vous sûr de vouloir supprimer la copie <strong>{{ bookinstance.id }}</strong> du livre <em>{{ bookinstance.book.title }}</em> ?</p>

<form action="" method="POST">
  {% csrf_token %}
  <input type="submit" value="Oui, supprimer" class="btn btn-danger" />
  <a href="{% url 'book-detail' bookinstance.book.slug %}" class="btn btn-secondary">Annuler</a>
</form>
{% endblock %}
